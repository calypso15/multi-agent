# Multi-Agent Fiction Review — Example Configuration
# Copy this file to your fiction repository as "multi_agent.toml" and
# adjust the values to match your project structure.

[general]
# Glob patterns for files the agents should review
file_patterns = ["*.md", "*.txt"]

# Number of agents that must approve for consensus (out of enabled agents)
consensus_threshold = 2

# Maximum time (seconds) each agent is allowed to run
timeout_seconds = 600

# Directories containing established canon files used as review context.
# Agents cross-reference new content against these files.
canon_directories = ["canon"]

# Maximum total size (KB) of canon content loaded into agent context
max_canon_size_kb = 500

# Maximum propose-review iteration rounds before presenting best result
max_rounds = 3

# Minimum severity for proposed edits: "critical", "major", "minor", or "suggestion"
# Set to "major" to skip minor/stylistic nitpicks and focus on real issues
min_severity = "minor"

# Maximum turns per agent in the propose phase
# Agents use Read to explore canon files, so need at least 2-3 turns
propose_max_turns = 3

# Maximum turns per agent in review rounds
review_max_turns = 2

# Each agent section can override model or provide a custom system prompt.
# Disable an agent by setting enabled = false.
# Set review_model to use a faster/cheaper model for review rounds (e.g. haiku).

[agents.scientific_rigor]
enabled = true
propose_model = "claude-sonnet-4-6"
# review_model = "claude-haiku-4-5-20251001"
# Tools available during the propose phase (e.g. web search for fact-checking)
allowed_tools = ["WebSearch", "WebFetch"]
# system_prompt_override = "Custom prompt text..."

[agents.canon_continuity]
enabled = true
propose_model = "claude-sonnet-4-6"
# review_model = "claude-haiku-4-5-20251001"

[agents.sociopolitical]
enabled = true
propose_model = "claude-sonnet-4-6"
# review_model = "claude-haiku-4-5-20251001"
allowed_tools = ["WebSearch", "WebFetch"]

# Custom tasks (used with --task flag). Built-in tasks: expand, contract
# Usage: python -m multi_agent review-files --task deepen-characters canon/chapter-03.md

[tasks.deepen-characters]
prompt = "Focus on deepening character voices, adding internal monologue, and making dialogue more distinctive and memorable."

[tasks.worldbuild]
prompt = "Enrich world-building details: sensory descriptions, environmental atmosphere, cultural texture, and background activity that makes settings feel lived-in."
